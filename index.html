<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Richardson — Site Under Maintenance</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="assets/icons/favicon-3.svg" type="image/x-icon">
    <style>
      :root {
        --bg: #F1F5F9;
        --ink: #1E293B;
        --muted: #55606E;
        --rust: #B4462B;
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg);
        color: var(--ink);
        text-align: center;
        box-sizing: border-box;
      }
      .wrap {
        max-width: 480px;
      }
      h1 {
        font-family: 'Josefin Sans', -apple-system, sans-serif;
        font-weight: 700;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        letter-spacing: -0.02em;
        margin: 0 0 12px;
      }
      h1 span {
        color: var(--rust);
      }
      p {
        font-size: 1.0625rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 8px;
      }
      a {
        color: var(--ink);
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      a:hover {
        color: var(--rust);
      }
    </style>
</head>
<body>
    <div class="wrap">
        <h1><span>Thomas Richardson</span> — site's down for a bit</h1>
        <p>Making some updates behind the scenes. Back shortly.</p>
        <p>Need to reach me in the meantime? <a href="mailto:thomasrichardson.contact@gmail.com">thomasrichardson.contact@gmail.com</a></p>
    </div>
</body>
</html>
